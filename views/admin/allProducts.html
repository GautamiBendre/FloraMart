<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>All Products</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
     <link rel="stylesheet"
    href="/css/admin/admin-layout.css">

    <link rel="stylesheet"
        href="/css/admin/allProducts.css">

</head>

<body>

<div class="admin-layout">


    <!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        Bloom Heaven

    </div>

    <ul>


        <!-- Dashboard -->

        <li class="active">

            <a href="/admin/dashboard">

                <i class="fa-solid fa-table-columns"></i>

                <span>

                    Dashboard

                </span>

            </a>

        </li>



        <!-- Products -->

        <li>

            <a href="/admin/products">

                <i class="fa-solid fa-box"></i>

                <span>

                    Products

                </span>

            </a>

        </li>



        <!-- Orders -->

        <li>

            <a href="/admin/orders">

                <i class="fa-solid fa-cart-shopping"></i>
                Orders
                <span id="orderCount">

                        0

                    </span>
            </a>

        </li>
        <li>

            <a href="/admin/completedOrders">

                <i class="fa-solid fa-check-circle"></i>

                Completed Orders

            </a>

        </li>



        <!-- Offers -->

        <li>

            <a href="/admin/offers">

                <i class="fa-solid fa-tags"></i>

                <span>

                    Offers

                </span>

            </a>

        </li>

    </ul>

</div>


    <!-- Main -->

    <div class="main-content">


        <!-- Topbar -->

        <div class="topbar">

            <h2>

                All Products

            </h2>

        </div>


        <div class="search-section">

    <!-- Search -->

    <div class="search-box">

        <input type="text"
            id="searchInput"
            placeholder="Search Product...">

    </div>

    <!-- Sort -->

    <div class="sort-box">

        <select id="sortSelect">

            <option value="default">

                Sort Products

            </option>

            <option value="name">

                Name A-Z

            </option>

            <option value="low">

                Price Low to High

            </option>

            <option value="high">

                Price High to Low

            </option>

        </select>

    </div>

</div>


        <!-- Product List -->

        <div id="productList">

        </div>

    </div>

</div>

<script src="/js/allProducts.js"></script>

</body>

</html>
