<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="/css/admin.css">

</head>

<body>

<div class="admin-layout">


    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">

            Bloom Heaven

        </div>

    </div>


    <!-- Main -->

    <div class="main-content">

        <div class="topbar">

            <h2>

                Edit Product

            </h2>

        </div>


        <!-- Form -->

        <div class="product-form-box">

            <form id="editForm">

                <div class="form-group">

                    <label>

                        Product Title

                    </label>

                    <input type="text"
                        id="title">

                </div>


                <div class="form-group">

                    <label>

                        Description

                    </label>

                    <textarea id="description"></textarea>

                </div>


                <div class="form-group">

                    <label>

                        Price

                    </label>

                    <input type="number"
                        id="price">

                </div>


                <button type="submit">

                    Update Product

                </button>

            </form>

        </div>

    </div>

</div>

<script src="/js/editProduct.js"></script>

</body>

</html>
