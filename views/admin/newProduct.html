<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Products</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
     <link rel="stylesheet"
    href="/css/admin/admin-layout.css">

    <link rel="stylesheet"
        href="/css/admin.css">

    <link rel="stylesheet"
        href="/css/newProduct.css">

</head>

<body>

<div class="admin-layout">


    <!-- Sidebar -->

<div class="sidebar">

    <div class="logo">

        Bloom Heaven

    </div>

    <ul>


        <!-- Dashboard -->

        <li class="active">

            <a href="/admin/dashboard">

                <i class="fa-solid fa-table-columns"></i>

                <span>

                    Dashboard

                </span>

            </a>

        </li>



        <!-- Products -->

        <li>

            <a href="/admin/products">

                <i class="fa-solid fa-box"></i>

                <span>

                    Products

                </span>

            </a>

        </li>



        <!-- Orders -->

        <li>

            <a href="/admin/orders">

                <i class="fa-solid fa-cart-shopping"></i>

                <span>

                    Orders

                </span>

            </a>

        </li>
        <li>

            <a href="/admin/completedOrders">

                <i class="fa-solid fa-check-circle"></i>

                Completed Orders

            </a>

        </li>



        <!-- Offers -->

        <li>

            <a href="/admin/offers">

                <i class="fa-solid fa-tags"></i>

                <span>

                    Offers

                </span>

            </a>

        </li>

    </ul>

</div>


    <!-- Main -->

    <div class="main-content">


        <!-- Topbar -->

        <div class="topbar">

            <h2>

                Product Management

            </h2>

        </div>


        <!-- Form -->

        <div class="product-form-box">

            <h2>

                Add New Product

            </h2>

            <form id="productForm"  enctype="multipart/form-data">

                <div class="form-group">

                    <label>

                        Product Title

                    </label>

                    <input type="text"
                        id="title"
                        required>

                </div>


                <div class="form-group">

                    <label>

                        Description

                    </label>

                    <textarea id="description"
                        required></textarea>

                </div>


                <div class="form-group">

                    <label>

                        Price

                    </label>

                    <input type="number"
                        id="price"
                        required>

                </div>
                <div class="form-group">

                    <label>

                        Categories

                    </label>

                    <input type="text"
                        id="category"
                        placeholder="Birthday, Luxury, Wedding">

                </div>


                <div class="form-group">

        <label>

            Upload Images

        </label>

        <input type="file"
            id="images"
            multiple
            accept="image/*"
            required>

        </div>

                <button type="submit">

                    Upload Product

                </button>

            </form>

        </div>

    </div>

</div>

<script src="/js/admin.js"></script>

</body>

</html>
