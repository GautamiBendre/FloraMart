<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Offers</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Layout CSS -->

    <link rel="stylesheet"
    href="/css/admin/admin-layout.css">

    <!-- Offers CSS -->

    <link rel="stylesheet"
    href="/css/admin/offers.css">

</head>

<body>

<div class="admin-layout">


    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">

            Bloom Heaven

        </div>

        <ul>

            <li>

                <a href="/admin/dashboard">

                    <i class="fa-solid fa-table-columns"></i>

                    <span>

                        Dashboard

                    </span>

                </a>

            </li>

            <li>

                <a href="/admin/products">

                    <i class="fa-solid fa-box"></i>

                    <span>

                        Products

                    </span>

                </a>

            </li>

            <li>

                <a href="/admin/orders">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span>

                        Orders

                    </span>

                </a>

            </li>

            <li class="active">

                <a href="/admin/offers">

                    <i class="fa-solid fa-tags"></i>

                    <span>

                        Offers

                    </span>

                </a>

            </li>

        </ul>

    </div>



    <!-- MAIN -->

    <div class="main-content">


        <!-- TOPBAR -->

        <div class="topbar">

            <h2>

                Offers

            </h2>

        </div>



        <!-- FORM -->

        <div class="offer-form-card">

            <h3>

                Create Offer

            </h3>

            <form id="offerForm">


                <input
                type="text"

                id="title"

                placeholder="Offer Title"

                required>



                <textarea
                id="description"

                placeholder="Offer Description"

                required>

                </textarea>



                <input
                type="text"

                id="image"

                placeholder="Offer Image URL"

                required>



                <input
                type="text"

                id="discount"

                placeholder="Discount (Example: 20% OFF)"

                required>



                <input
                type="date"

                id="expiryDate">



                <button type="submit">

                    Create Offer

                </button>

            </form>

        </div>



        <!-- OFFERS LIST -->

        <div id="offersContainer">

        </div>

    </div>

</div>

<script src="/js/offers.js"></script>

</body>

</html>
