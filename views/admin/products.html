<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Products</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
     <link rel="stylesheet"
    href="/css/admin/admin-layout.css">

    <link rel="stylesheet"
    href="/css/admin/products.css">

</head>

<body>

<div class="admin-layout">


   <div class="sidebar">

    <div class="logo">

        Bloom Heaven

    </div>

    <ul>


        <!-- Dashboard -->

        <li class="active">

            <a href="/admin/dashboard">

                <i class="fa-solid fa-table-columns"></i>

                <span>

                    Dashboard

                </span>

            </a>

        </li>



        <!-- Products -->

        <li>

            <a href="/admin/products">

                <i class="fa-solid fa-box"></i>

                <span>

                    Products

                </span>

            </a>

        </li>



        <!-- Orders -->

        <li>

            <a href="/admin/orders">

                <i class="fa-solid fa-cart-shopping"></i>
                Orders
                <span>

                    0

                </span>

            </a>

        </li>
        <li>

            <a href="/admin/completedOrders">

                <i class="fa-solid fa-check-circle"></i>

                Completed Orders

            </a>

        </li>



        <!-- Offers -->

        <li>

            <a href="/admin/offers">

                <i class="fa-solid fa-tags"></i>

                <span>

                    Offers

                </span>

            </a>

        </li>

    </ul>

</div>


    <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <h2>

                Product Management

            </h2>

        </div>


        <!-- Options -->

        <div class="product-options">


            <!-- Add Product -->

            <a href="/admin/newProduct"
                class="option-card">

                <i class="fa-solid fa-plus"></i>

                <h3>

                    Add New Product

                </h3>

            </a>


            <!-- View Products -->

            <a href="/admin/allProducts"
                class="option-card">

                <i class="fa-solid fa-box-open"></i>

                <h3>

                    View All Products

                </h3>

            </a>

        </div>

    </div>

</div>

</body>

</html>
