<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cart</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

</head>

<body>


<!-- =========================
     NAVBAR
========================= -->

<nav class="navbar navbar-expand-lg">

    <div class="container">


        <!-- Logo -->

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>



        <!-- Mobile Toggle -->

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileMenu">

            ☰

        </button>



        <!-- Desktop Menu -->

        <div class="desktop-menu ms-auto">

            <ul class="navbar-nav align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="/">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="/shop">

                        Shop

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link cart-link active"
                        href="/cart.html">

                        Cart

                        <span id="cartCount">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>



<!-- =========================
     MOBILE SIDEBAR
========================= -->

<div
class="offcanvas offcanvas-end"
tabindex="-1"
id="mobileMenu">

    <div class="offcanvas-header">

        <h5 class="offcanvas-title">

            Bloom Heaven

        </h5>

        <button
        type="button"

        class="btn-close"

        data-bs-dismiss="offcanvas">

        </button>

    </div>



    <div class="offcanvas-body">

        <ul class="mobile-nav">

            <li>

                <a href="/">

                    Home

                </a>

            </li>

            <li>

                <a href="/shop">

                    Shop

                </a>

            </li>

            <li>

                <a href="/cart.html">

                    Cart

                </a>

            </li>

            <li>

                <a href="#">

                    Offers

                </a>

            </li>

            <li>

                <a href="#">

                    Contact

                </a>

            </li>

        </ul>

    </div>

</div>



<!-- =========================
     CART SECTION
========================= -->

<section class="cart-section">


    <!-- Title -->

    <div class="section-title">

        <p>

            YOUR CART

        </p>

        <h2>

            Shopping Bag

        </h2>

    </div>



    <!-- Cart Container -->

    <div class="cart-container"
        id="cartContainer">

    </div>



    <!-- Total -->

    <div class="cart-summary">

        <h3>

            Total:
            ₹<span id="cartTotal">

                0

            </span>

        </h3>



        <a href="/checkout.html">

            <button>

                Proceed To Checkout

            </button>

        </a>

    </div>

</section>



<!-- Cart JS -->

<script src="/js/cart.js"></script>



<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
