<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

</head>

<body>


<!-- =========================
     NAVBAR
========================= -->

<nav class="navbar navbar-expand-lg">

    <div class="container">


        <!-- Logo -->

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>



        <!-- Mobile Toggle -->

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileMenu">

            ☰

        </button>



        <!-- Desktop Menu -->

        <div class="desktop-menu ms-auto">

            <ul class="navbar-nav align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="/">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="/shop">

                        Shop

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link cart-link active"
                        href="/cart.html">

                        Cart

                        <span id="cartCount">

                            0

                        </span>

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>



<!-- =========================
     MOBILE SIDEBAR
========================= -->

<div
class="offcanvas offcanvas-end"
tabindex="-1"
id="mobileMenu">

    <div class="offcanvas-header">

        <h5 class="offcanvas-title">

            Bloom Heaven

        </h5>

        <button
        type="button"

        class="btn-close"

        data-bs-dismiss="offcanvas">

        </button>

    </div>



    <div class="offcanvas-body">

        <ul class="mobile-nav">

            <li>

                <a href="/">

                    Home

                </a>

            </li>

            <li>

                <a href="/shop">

                    Shop

                </a>

            </li>

            <li>

                <a href="/cart.html">

                    Cart

                </a>

            </li>

            <li>

                <a href="#">

                    Offers

                </a>

            </li>

            <li>

                <a href="#">

                    Contact

                </a>

            </li>

        </ul>

    </div>

</div>



<!-- =========================
     CHECKOUT SECTION
========================= -->

<section class="checkout-section">


    <!-- Left -->

    <div class="checkout-form">


        <h2>

            Checkout Details

        </h2>


        <form id="checkoutForm">


            <input type="text"
                id="name"
                placeholder="Full Name"
                required>


            <input type="text"
                id="phone"
                placeholder="Phone Number"
                required>


            <textarea id="address"
                placeholder="Delivery Address"
                required></textarea>


            <input type="date"
                id="deliveryDate"
                required>


            <textarea id="note"
                placeholder="Special Note"></textarea>



            <!-- Payment -->

            <div class="payment-method">

                <label>

                    Payment Method

                </label>

                <select id="paymentMethod">

                    <option value="COD">

                        Cash On Delivery

                    </option>

                    <option value="UPI">

                        UPI Payment

                    </option>

                </select>

            </div>



            <button type="submit">

                Place Order

            </button>

        </form>

    </div>



    <!-- Right -->

    <div class="checkout-summary">


        <h2>

            Order Summary

        </h2>


        <div id="checkoutItems">

        </div>


        <h3>

            Total:
            ₹<span id="checkoutTotal">

                0

            </span>

        </h3>

    </div>

</section>



<!-- Checkout JS -->

<script src="/js/checkout.js"></script>



<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
