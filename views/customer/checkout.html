<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

</head>

<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>

    </div>

</nav>



<!-- Checkout -->

<section class="checkout-section">


    <!-- Left -->

    <div class="checkout-form">


        <h2>

            Checkout Details

        </h2>


        <form id="checkoutForm">


            <input type="text"
                id="name"
                placeholder="Full Name"
                required>


            <input type="text"
                id="phone"
                placeholder="Phone Number"
                required>


            <textarea id="address"
                placeholder="Delivery Address"
                required></textarea>


            <input type="date"
                id="deliveryDate"
                required>


            <textarea id="note"
                placeholder="Special Note"></textarea>



            <!-- Payment -->

            <div class="payment-method">

                <label>

                    Payment Method

                </label>

                <select id="paymentMethod">

                    <option value="COD">

                        Cash On Delivery

                    </option>

                    <option value="UPI">

                        UPI Payment

                    </option>

                </select>

            </div>


            <button type="submit">

                Place Order

            </button>

        </form>

    </div>



    <!-- Right -->

    <div class="checkout-summary">


        <h2>

            Order Summary

        </h2>


        <div id="checkoutItems">

        </div>


        <h3>

            Total:
            ₹<span id="checkoutTotal">

                0

            </span>

        </h3>

    </div>

</section>


<script src="/js/checkout.js"></script>

</body>

</html>
