<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Bloom Heaven</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

</head>

<body>


    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid px-lg-5 px-3">

            <!-- Logo -->

            <a class="navbar-brand"
                href="#">

                Bloom Heaven

            </a>


            <!-- Mobile Toggle -->

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>


            <!-- Nav Links -->

            <div class="collapse navbar-collapse justify-content-end"
                id="navbarNav">

                <ul class="navbar-nav align-items-lg-center">

                    <li class="nav-item">
                        <a class="nav-link active"
                            href="#">
                            HOME
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="/shop">
                            SHOP
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link cart-link"
                            href="/cart.html">
                            CART
                            <span id="cartCount">
                                0
                            </span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="#">
                            OFFERS
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link"
                            href="#">
                            CONTACT
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>



    <!-- Hero Section -->

    <section class="hero-section">


        <!-- Background Floral Image -->

        <div class="hero-image">

            <img src="https://images.unsplash.com/photo-1519378058457-4c29a0a2efac?q=80&w=1800&auto=format&fit=crop"
                alt="Flowers">

        </div>



        <!-- Overlay Content -->

        <div class="hero-content">

            <p class="hero-welcome">

                Welcome

            </p>


            <h1>

                LET’S
                CREATE
                SOMETHING
                BEAUTIFUL

            </h1>


            <p class="hero-text">

                Elegant floral arrangements crafted
                with beauty, emotion and luxury.

            </p>
            <a href="/shop">

            <button class="hero-button">

                SHOP NOW →

            </button>

        </a>
           
        </div>

    </section>

    <script src="/js/main.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
