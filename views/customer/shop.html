<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Shop</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->
     <link rel="stylesheet"
href="/css/style.css">

    <link rel="stylesheet"
    href="/css/customer/navbar.css">

    <link rel="stylesheet"
    href="/css/customer/shop.css">

</head>

<body>


<!-- =========================
     NAVBAR
========================= -->

<nav class="navbar navbar-expand-lg">

    <div class="container">


        <!-- Logo -->

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>



        <!-- RIGHT MOBILE ACTIONS -->

        <div class="mobile-actions d-lg-none">


            <!-- MOBILE CART -->

            <a href="/cart.html"
                class="mobile-cart">

                🛒

                <span id="mobileCartCount">

                    0

                </span>

            </a>



            <!-- MOBILE MENU BUTTON -->

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu">

                ☰

            </button>

        </div>



        <!-- DESKTOP MENU -->

        <div
            class="collapse navbar-collapse"
            id="mainNavbar">

            <ul class="navbar-nav ms-auto align-items-lg-center">


                <!-- Home -->

                <li class="nav-item">

                    <a class="nav-link active"
                        href="/">

                        Home

                    </a>

                </li>



                <!-- Shop -->

                <li class="nav-item">

                    <a class="nav-link"
                        href="/shop">

                        Shop

                    </a>

                </li>



                <!-- Cart -->

                <li class="nav-item">

                    <a class="nav-link cart-link"
                        href="/cart.html">

                        Cart

                        <span id="cartCount">

                            0

                        </span>

                    </a>

                </li>



                <!-- My Orders -->

                <li class="nav-item">

                    <a class="nav-link"
                        href="/myOrders.html">

                        My Orders

                    </a>

                </li>



                <!-- Offers -->

                <li class="nav-item">

                    <a class="nav-link"
                        href="/offers.html">

                        Offers

                    </a>

                </li>



                <!-- Contact -->

                <li class="nav-item">

                    <a class="nav-link"
                        href="/contact.html">

                        Contact

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>



<!-- =========================
     MOBILE SIDEBAR
========================= -->

<div
class="offcanvas offcanvas-end"
tabindex="-1"
id="mobileMenu">

    <div class="offcanvas-header">

        <h5 class="offcanvas-title">

            Bloom Heaven

        </h5>

        <button
        type="button"

        class="btn-close"

        data-bs-dismiss="offcanvas">

        </button>

    </div>



    <div class="offcanvas-body">

        <ul class="mobile-nav">

            <li>

                <a href="/">

                    Home

                </a>

            </li>

            <li>

                <a href="/shop">

                    Shop

                </a>

            </li>

            <li>

                <a href="/cart.html">

                    Cart

                </a>

            </li>

            <li>

                <a href="/myOrders.html">

                    My Orders

                </a>

            </li>

            <li>

                <a href="/offers.html">

                    Offers

                </a>

            </li>

            <li>

                <a href="/contact.html">

                    Contact

                </a>

            </li>

        </ul>

    </div>

</div>


<!-- =========================
     PRODUCTS SECTION
========================= -->

<section class="products-section">


    <!-- Title -->

    <div class="section-title">

        <p>

            OUR COLLECTION

        </p>

        <h2>

            Luxury Flower Arrangements

        </h2>

    </div>



    <!-- Controls -->

    <div class="product-controls">


        <!-- Search -->

        <div class="search-wrapper">

            <input type="text"
                id="searchInput"
                placeholder="Search floral collection">

        </div>



        <!-- Category -->

        <div class="category-wrapper">

            <select id="categorySelect">

                <option value="All">

                    All Categories

                </option>

                <option value="Birthday">

                    Birthday

                </option>

                <option value="Luxury">

                    Luxury

                </option>

                <option value="Wedding">

                    Wedding

                </option>

                <option value="Anniversary">

                    Anniversary

                </option>

            </select>

        </div>



        <!-- Sort -->

        <div class="sort-wrapper">

            <select id="sortSelect">

                <option value="default">

                    Sort Collection

                </option>

                <option value="name">

                    Name A-Z

                </option>

                <option value="low">

                    Price Low to High

                </option>

                <option value="high">

                    Price High to Low

                </option>

            </select>

        </div>

    </div>



    <!-- Products -->

    <div class="products-container"
        id="products-container">

    </div>

</section>



<!-- Main JS -->

<script src="/js/main.js"></script>



<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
