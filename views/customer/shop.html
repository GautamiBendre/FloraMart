<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Shop</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

</head>

<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-lg">

    <div class="container">


        <!-- Logo -->

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>


        <!-- Menu -->

        <div class="collapse navbar-collapse justify-content-end">

            <ul class="navbar-nav">

                <li class="nav-item">

                    <a class="nav-link"
                        href="/">

                        HOME

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="/shop">

                        SHOP

                    </a>

                </li>
                <li class="nav-item">
                        <a class="nav-link cart-link"
                            href="/cart.html">
                            CART
                            <span id="cartCount">
                                0
                            </span>
                        </a>
                </li>


                <li class="nav-item">

                    <a class="nav-link"
                        href="#">

                        OFFERS

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="#">

                        CONTACT

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>



<!-- Products Section -->

<section class="products-section">


    <!-- Title -->

    <div class="section-title">

        <p>

            OUR COLLECTION

        </p>

        <h2>

            Luxury Flower Arrangements

        </h2>

    </div>



    <!-- Controls -->

    <div class="product-controls">


        <!-- Search -->

        <div class="search-wrapper">

            <input type="text"
                id="searchInput"
                placeholder="Search floral collection">

        </div>
        <div class="category-wrapper">

    <select id="categorySelect">

        <option value="All">

            All Categories

        </option>

        <option value="Birthday">

            Birthday

        </option>

        <option value="Luxury">

            Luxury

        </option>

        <option value="Wedding">

            Wedding

        </option>

        <option value="Anniversary">

            Anniversary

        </option>

    </select>

</div>


        <!-- Sort -->

        <div class="sort-wrapper">

            <select id="sortSelect">

                <option value="default">

                    Sort Collection

                </option>

                <option value="name">

                    Name A-Z

                </option>

                <option value="low">

                    Price Low to High

                </option>

                <option value="high">

                    Price High to Low

                </option>

            </select>

        </div>


    </div>



    <!-- Products -->

    <div class="products-container"
        id="products-container">

    </div>

</section>


<script src="/js/main.js"></script>

</body>

</html>
