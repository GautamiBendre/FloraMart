<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Order Successful</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Global CSS -->

    <link rel="stylesheet"
        href="/css/style.css">

    <!-- Navbar CSS -->

    <link rel="stylesheet"
        href="/css/customer/navbar.css">

    <!-- Success CSS -->

    <link rel="stylesheet"
        href="/css/customer/success.css">

</head>

<body>

<!-- =========================
     NAVBAR
========================= -->

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand"
            href="/">

            Bloom Heaven

        </a>

    </div>

</nav>



<!-- =========================
     SUCCESS SECTION
========================= -->

<section class="success-section">

    <div class="success-card">

        <div class="success-icon">

            ✓

        </div>

        <p class="success-subtitle">

            ORDER CONFIRMED

        </p>

        <h1>

            Order Placed Successfully

        </h1>

        <p class="success-text">

            Thank you for shopping with Bloom Heaven.
            Your bouquet is being prepared beautifully.

        </p>

        <div class="order-id">

            Order ID :
            <span id="orderId">

            </span>

        </div>

        <div class="success-buttons">

            <a href="/shop">

                <button>

                    Continue Shopping

                </button>

            </a>

            <a href="/track.html">

                <button class="track-btn">

                    Track Order

                </button>

            </a>

        </div>

    </div>

</section>



<!-- Success JS -->

<script src="/js/success.js"></script>

</body>

</html>
